// === Универсальный аудио-плеер для превью треков ===
const previewAudio = new Audio();
previewAudio.preload = 'metadata';
let currentPreviewKey = null; // ключ трека, который сейчас играет (или null)
let progressTimer = null;

function setPlayingState(key){
  // Маленькая кнопка ПРЕВЬЮ справа в списке треков
  const smallIcon = document.getElementById('preview-icon-'+key);
  if(smallIcon){
    smallIcon.innerHTML = '<div style="display:flex;gap:3px"><div style="width:3px;height:10px;background:#0a0a0f;border-radius:1px"></div><div style="width:3px;height:10px;background:#0a0a0f;border-radius:1px"></div></div>';
  }
  const smallLabel = document.getElementById('preview-label-'+key);
  if(smallLabel){
    smallLabel.textContent = 'ИГРАЕТ';
  }
  // Большая кнопка на странице трека
  const largeIcon = document.getElementById('preview-icon-'+key+'-large');
  if(largeIcon){
    largeIcon.outerHTML = '<div id="preview-icon-'+key+'-large" style="display:flex;gap:4px"><div style="width:4px;height:16px;background:#0a0a0f;border-radius:2px"></div><div style="width:4px;height:16px;background:#0a0a0f;border-radius:2px"></div></div>';
  }
}

function setIdleState(key){
  const smallIcon = document.getElementById('preview-icon-'+key);
  if(smallIcon){
    smallIcon.innerHTML = '<div style="width:0;height:0;border-left:8px solid #0a0a0f;border-top:5px solid transparent;border-bottom:5px solid transparent;margin-left:2px"></div>';
  }
  const smallLabel = document.getElementById('preview-label-'+key);
  if(smallLabel){
    smallLabel.textContent = '15 СЕК';
  }
  const largeIcon = document.getElementById('preview-icon-'+key+'-large');
  if(largeIcon){
    largeIcon.outerHTML = '<div id="preview-icon-'+key+'-large" style="width:0;height:0;border-left:14px solid #0a0a0f;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:3px"></div>';
  }
  const progress = document.getElementById('preview-progress-'+key);
  if(progress) progress.style.width = '0%';
}

function togglePreview(key, src){
  // Если жмём на тот же трек, который сейчас играет — пауза
  if(currentPreviewKey === key && !previewAudio.paused){
    previewAudio.pause();
    previewAudio.currentTime = 0;
    if(progressTimer) clearInterval(progressTimer);
    setIdleState(key);
    currentPreviewKey = null;
    return;
  }
  // Если играл другой трек — остановить его
  if(currentPreviewKey && currentPreviewKey !== key){
    setIdleState(currentPreviewKey);
    if(progressTimer) clearInterval(progressTimer);
  }
  // Запустить новый
  previewAudio.src = src;
  previewAudio.currentTime = 0;
  previewAudio.play().catch(function(err){ console.error('Preview play failed:', err); });
  currentPreviewKey = key;
  setPlayingState(key);
  progressTimer = setInterval(function(){
    const progress = document.getElementById('preview-progress-'+key);
    if(progress && previewAudio.duration){
      progress.style.width = (previewAudio.currentTime / previewAudio.duration * 100) + '%';
    }
  }, 100);
}

previewAudio.addEventListener('ended', function(){
  if(currentPreviewKey){
    setIdleState(currentPreviewKey);
  }
  if(progressTimer) clearInterval(progressTimer);
  currentPreviewKey = null;
});

function render(key){
  const screen = screens[key];
  if(!screen) return;
  document.getElementById('screen-container').innerHTML = screen.html;
  document.getElementById('screen-label').textContent = screen.label;
  document.getElementById('back-btn').style.display = screen.showBack ? 'block' : 'none';
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.preventDefault();
      const target = el.getAttribute('data-nav');
      if(target === '#') return;
      if(target === 'home'){ history.length = 0; history.push('home'); }
      else { history.push(target); }
      render(target);
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
  // Превью-плеер: клик по обложке/большой кнопке проигрывает аудио-сэмпл
  document.querySelectorAll('[data-preview]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      const key = el.getAttribute('data-preview').replace('-large','');
      const src = el.getAttribute('data-preview-src');
      togglePreview(key, src);
    });
  });
}

document.getElementById('back-btn').addEventListener('click', function(){
  if(history.length > 1){
    history.pop();
    render(history[history.length-1]);
  }
});

render('home');
})();
