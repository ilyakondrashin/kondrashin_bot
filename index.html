<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONDRASHIN · Channel Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a22; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px 10px; color: #e8e8ec; }
.app-wrap { width: 100%; max-width: 400px; }
.app-hint { text-align: center; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 12px; line-height: 1.5; }
.phone-frame { background: #0a0a0f; border-radius: 18px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.15); position: relative; }
.phone-header { background: #161620; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 10; }
.back-btn { font-family: ui-monospace, monospace; font-size: 16px; color: rgba(255,255,255,0.7); cursor: pointer; padding: 4px 8px; display: none; user-select: none; }
.back-btn:hover { color: #fff; }
.channel-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #1a2440 0%, #050510 100%); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: ui-monospace, monospace; font-size: 11px; color: #fff; font-weight: 500; }
.channel-name { font-size: 13px; color: #fff; font-weight: 500; }
.screen-label { font-size: 10px; color: rgba(255,255,255,0.45); }
.screen-container { min-height: 500px; }
[data-nav] { cursor: pointer; transition: all 0.15s; }
.btn-nav { background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.1); padding: 10px 12px; border-radius: 8px; }
.btn-nav:hover { background: rgba(255,255,255,0.12); }
.btn-arrow { font-family: ui-monospace, monospace; font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; }
.btn-label { font-size: 13px; color: #fff; font-weight: 500; margin-top: 2px; }
.btn-sub { font-size: 10px; color: rgba(255,255,255,0.45); }
.app-credit { text-align: center; font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 14px; }
</style>
</head>
<body>

<div class="app-wrap">
  <div class="app-hint">👇 тыкай любые кнопки<br>стрелка ← наверху возвращает обратно</div>

      `<div style="padding: 14px; color: #e8e8ec;">

        <div data-nav="kanye_post2" style="background: linear-gradient(135deg, rgba(255,80,200,0.12), rgba(255,40,100,0.04)); border: 0.5px solid rgba(255,150,200,0.3); padding: 10px; border-radius: 8px; margin-bottom: 8px;">

    };
  });

  const history = ['home'];

  function render(key) {
    const screen = screens[key];
    if (!screen) return;
    document.getElementById('screen-container').innerHTML = screen.html;
    document.getElementById('screen-label').textContent = screen.label;
    document.getElementById('back-btn').style.display = screen.showBack ? 'block' : 'none';
    document.querySelectorAll('[data-nav]').forEach(function(el) {
      el.addEventListener('click', function() {
        const target = el.getAttribute('data-nav');
        if (target === 'home') { history.length = 0; history.push('home'); }
        else { history.push(target); }
        render(target);
        window.scrollTo({top: 0, behavior: 'smooth'});
      });
    });
  }

  document.getElementById('back-btn').addEventListener('click', function() {
    if (history.length > 1) { history.pop(); render(history[history.length - 1]); }
  });

  render('home');
})();
</script>
