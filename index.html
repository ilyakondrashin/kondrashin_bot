function navBtn(label, sub, target){

    header = '<div style="background:'+t.grad+';aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative"><div style="width:60px;height:60px;background:rgba(0,0,0,0.55);border:1.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center"><div style="font-size:28px;color:#fff;line-height:1">♪</div></div><div style="position:absolute;top:10px;left:12px;font-family:ui-monospace,monospace;font-size:9px;color:rgba(255,255,255,0.7);letter-spacing:1.5px">♪ АУДИО</div></div>';
  } else {
    header = ytEmbed(t.id);
  }

  let actionBtns = '';
  if(!t.audioOnly){
    actionBtns = '<div style="font-family:ui-monospace,monospace;font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:8px">— ПОСМОТРЕТЬ —</div>'+
      '<a href="https://www.youtube.com/watch?v='+t.id+'" target="_blank" rel="noopener" style="text-decoration:none;display:block"><div style="background:#ff0000;padding:12px;border-radius:8px;display:flex;align-items:center;gap:10px;margin-bottom:14px"><div style="width:28px;height:28px;background:rgba(0,0,0,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center"><div style="width:0;height:0;border-left:8px solid #fff;border-top:5px solid transparent;border-bottom:5px solid transparent;margin-left:2px"></div></div><div style="flex:1"><div style="font-size:13px;color:#fff;font-weight:500">Полный клип на YouTube</div><div style="font-size:10px;color:rgba(255,255,255,0.85)">HD · в новой вкладке</div></div><div style="font-family:ui-monospace,monospace;font-size:12px;color:rgba(255,255,255,0.9)">↗</div></div></a>';
  }

  let streamBtn = '';
  if(t.audioOnly){
    streamBtn = '<div data-nav="album" style="background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);padding:12px;border-radius:8px;margin-bottom:14px"><div style="font-family:ui-monospace,monospace;font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:1.5px">★ СЛУШАТЬ НА СТРИМИНГАХ</div><div style="font-size:13px;color:#fff;margin-top:2px">Spotify · Apple · VK · Я.Музыка ▶</div></div>';
  }

  const btsButton = t.bts ? navBtn('ЗА КАДРОМ','этот клип',t.bts) : navBtn('ЗА КАДРОМ','все съёмки','behind');

  return header +
    '<div style="padding:14px;color:#e8e8ec">'+
      '<div style="font-family:ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;margin-bottom:6px">— '+(t.audioOnly?'ТРЕК':'КЛИП')+' '+t.date+' —</div>'+
      '<div style="font-size:20px;font-weight:500;color:#fff">'+t.title+'</div>'+

function render(key){
  const screen = screens[key];
  if(!screen) return;
  document.getElementById('screen-container').innerHTML = screen.html;
  document.getElementById('screen-label').textContent = screen.label;
  document.getElementById('back-btn').style.display = screen.showBack ? 'block' : 'none';
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.preventDefault();
      const target = el.getAttribute('data-nav');
      if(target === '#') return;
      if(target === 'home'){ history.length = 0; history.push('home'); }
      else { history.push(target); }
      render(target);
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

document.getElementById('back-btn').addEventListener('click', function(){
  if(history.length > 1){
    history.pop();
    render(history[history.length-1]);
  }
});

render('home');
})();
